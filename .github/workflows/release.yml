name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.21'

      - name: Run tests
        working-directory: dcocheck
        run: go test ./...

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: test
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github

      - name: Run Semantic Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          npx --no-install semantic-release 2>&1 | tee /tmp/sr-output.txt
          NEW_VERSION=$(grep -oE "Published release [0-9]+\.[0-9]+\.[0-9]+" /tmp/sr-output.txt | tail -1 | awk '{print $3}')
          if [ -n "$NEW_VERSION" ]; then
            NEW_TAG="v${NEW_VERSION}"
            echo "new_release_published=true"          >> "$GITHUB_OUTPUT"
            echo "new_release_version=${NEW_VERSION}"  >> "$GITHUB_OUTPUT"
            echo "new_release_git_tag=${NEW_TAG}"      >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build and Upload Assets
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.21'

      - name: Build binaries
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          mkdir -p dist
          cd dcocheck
          GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o ../dist/dcocheck ./cmd/dcocheck
          cd ../dist && tar -czf dcocheck-linux-amd64.tar.gz dcocheck && rm dcocheck && cd ../dcocheck
          GOOS=linux  GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o ../dist/dcocheck ./cmd/dcocheck
          cd ../dist && tar -czf dcocheck-linux-arm64.tar.gz dcocheck && rm dcocheck && cd ../dcocheck
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o ../dist/dcocheck ./cmd/dcocheck
          cd ../dist && tar -czf dcocheck-darwin-amd64.tar.gz dcocheck && rm dcocheck && cd ../dcocheck
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o ../dist/dcocheck ./cmd/dcocheck
          cd ../dist && tar -czf dcocheck-darwin-arm64.tar.gz dcocheck && rm dcocheck

      - name: Generate checksums
        run: |
          cd dist
          sha256sum dcocheck-*.tar.gz > checksums.txt

      - name: Upload assets to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ needs.release.outputs.new_release_git_tag }}
          files: |
            dist/dcocheck-*.tar.gz
            dist/checksums.txt

      - name: Update Homebrew formula
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
          TAG: ${{ needs.release.outputs.new_release_git_tag }}
        run: |
          DARWIN_AMD64_SHA=$(sha256sum dist/dcocheck-darwin-amd64.tar.gz | awk '{print $1}')
          DARWIN_ARM64_SHA=$(sha256sum dist/dcocheck-darwin-arm64.tar.gz | awk '{print $1}')
          LINUX_AMD64_SHA=$(sha256sum  dist/dcocheck-linux-amd64.tar.gz  | awk '{print $1}')
          LINUX_ARM64_SHA=$(sha256sum  dist/dcocheck-linux-arm64.tar.gz  | awk '{print $1}')
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/"                          Formula/dcocheck.rb
          sed -i "s/sha256 \"[^\"]*\" # darwin-arm64/sha256 \"${DARWIN_ARM64_SHA}\" # darwin-arm64/" Formula/dcocheck.rb
          sed -i "s/sha256 \"[^\"]*\" # darwin-amd64/sha256 \"${DARWIN_AMD64_SHA}\" # darwin-amd64/" Formula/dcocheck.rb
          sed -i "s/sha256 \"[^\"]*\" # linux-arm64/sha256 \"${LINUX_ARM64_SHA}\" # linux-arm64/"   Formula/dcocheck.rb
          sed -i "s/sha256 \"[^\"]*\" # linux-amd64/sha256 \"${LINUX_AMD64_SHA}\" # linux-amd64/"   Formula/dcocheck.rb
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dcocheck.rb
          git commit -m "chore(release): update Homebrew formula for ${TAG} [skip ci]"
          git push origin HEAD:main
